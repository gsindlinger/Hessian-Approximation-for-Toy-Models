experiment_name: ''
hessian_analysis:
  computation_config:
    approximators:
    - exact
    - kfac
    - ekfac
    - gnh
    - fim
    - block_fim
    - block_hessian
    - shampoo
    - eshampoo
    - identity
    comparison_references:
    - exact
    - gnh
    computation_types:
    - matrix
    - hvp
    - ihvp
    regularization_value: 0.1
    regularization_strategy: auto_mean_eigenvalue_correction
    pseudo_target_generation_strategy: mcmc
    pseudo_target_generation_repetitions: 1
    compute_influence: true
    # Subsample the collector input. null/omit = full train.
    collector_subset_size: null
  matrix_config:
    metrics:
    - frobenius
    - relative_frobenius
    - spectral
    - spectral_relative
    - cosine_similarity
    - trace_distance
  vector_config:
    metrics:
    - absolute_l2_diff
    - relative_error
    - cosine_similarity
    - inner_product_diff
    - relative_inner_product_diff
    - relative_energy_diff
    - inner_product_ratio
    num_samples: 500
    sampling_method: gradients
    # Source for the second probe set used in HVP/IHVP comparison metrics
    # (`grads_2`). `grads_1` is always sampled from train. `test` matches
    # influence-score semantics; `train` reproduces pre-merge behavior.
    comparison_probe_source: test
  analysis_seed: 42
models: []
epochs:
  - 10
  - 100
  - 1000
